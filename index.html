<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora Simples</title>
</head>
<body>

    <header id="topo"> 
        <p>CALCULADORA</p>
    </header>

    <form class="flex">
        <div class="ajuste">
            <label for="valor1"> Campo 1: </label>
            <input type="number" id="valor1" required>
        </div>
        <div class="ajuste">
            <label for="valor2"> Campo 2: </label>
            <input type="number" id="valor2" required>
        </div>
    </form>
    <div class="flex">
        <button class="botao" onclick="somar()"> Soma (+) </button>
        <button class="botao" onclick="subtrair()"> Subtração (-) </button>
        <button class="botao" onclick="multiplicar()"> Multiplicação (*) </button>
        <button class="botao" onclick="dividir()"> Divisão (/) </button>
    </div>
    <div class="flex">
        <p id="result"> O resultado da operação é: </p>
    </div>

    <script src="calculadora.js"></script>
    
</body>
</html>
