<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora Simples</title>
</head>
<body>

    <header id="topo"> 
        <p>CALCULADORA</p>
    </header>

    <form class="flex">
        <div class="ajuste">
            <label for="valor1">Insira o primeiro valor: </label>
            <input type="number" id="valor1" required>
        </div>
        <div class="ajuste">
            <label for="valor2">Insira o segundo valor: </label>
            <input type="number" id="valor2" required>
        </div>
    </form>
    <div class="flex">
        <button class="botao" onclick=""> Soma (+) </button>
        <button class="botao" onclick=""> Subtração (-) </button>
        <button class="botao" onclick=""> Multiplicação (*) </button>
        <button class="botao" onclick=""> Divisão (/) </button>
    </div>
    <div class="flex">
        <p id="result"> O resultado da operação é: </p>
    </div>

    <script src="calculadora.js"></script>
    
</body>
</html>
